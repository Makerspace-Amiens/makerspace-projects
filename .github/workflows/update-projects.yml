name: Update projects and deploy

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install fetch script dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch projects from GitHub orgs
        run: node scripts/fetch-projects.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: scripts

      - name: Screenshot docs pages without a custom preview
        run: node scripts/screenshot-projects.js

      - name: Commit updated project data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/projects.yml _data/manual_projects.yml assets/screenshots
          git diff --staged --quiet || git commit -m "Update projects data"
          git push
        if: github.event_name != 'pull_request'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
