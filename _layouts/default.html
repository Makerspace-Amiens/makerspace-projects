<!DOCTYPE html>
<html lang="fr" class="has-navbar-fixed-top theme-light" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="navbar is-primary is-fixed-top" aria-label="navigation principale">
    <div class="container">
      <div class="navbar-brand">
        <a href="https://makerspace-amiens.fr" class="navbar-item">
          <img src="{{ '/assets/img/logo.svg' | relative_url }}" alt="{{ site.title }}" style="height:36px;width:auto;display:block;">
        </a>
        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>
      <div class="navbar-menu" id="navMenu">
        <div class="navbar-start">
          <a class="navbar-item" href="https://makerspace-amiens.fr">MakerSpace Amiens</a>
          <a class="navbar-item" href="https://doc.makerspace-amiens.fr">Documentation</a>
          <a class="navbar-item is-active" href="{{ '/' | relative_url }}">Projets</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="hero is-primary">
    <div class="hero-body">
      <div class="container">
        <p class="title">{{ site.title }}</p>
        <p class="subtitle">{{ site.description }}</p>
      </div>
    </div>
  </section>

  <main class="section">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="columns is-multiline">
        <div class="column has-text-centered"><a class="link" href="https://makerspace-amiens.fr">MakerSpace Amiens</a></div>
        <div class="column has-text-centered"><a class="link" href="https://doc.makerspace-amiens.fr">Documentation</a></div>
        <div class="column has-text-centered"><a class="link" href="{{ '/' | relative_url }}">Projets</a></div>
      </div>
      <p class="has-text-centered is-size-7 mt-4">Liste générée automatiquement depuis les organisations GitHub du Makerspace.</p>
    </div>
  </footer>

  <button type="button" id="back-to-top" aria-label="Remonter en haut de la page" hidden>↑</button>
  <script src="{{ '/assets/js/back-to-top.js' | relative_url }}"></script>
  <script>
    document.querySelectorAll(".navbar-burger").forEach(function (burger) {
      burger.addEventListener("click", function () {
        var target = document.getElementById(burger.dataset.target);
        burger.classList.toggle("is-active");
        if (target) target.classList.toggle("is-active");
      });
    });
  </script>
</body>
</html>
