# Projets ajoutés à la main (pas dans une des organisations GitHub scannées
# automatiquement, ex: projet hébergé ailleurs, organisation différente...).
# Ce fichier n'est jamais touché par scripts/fetch-projects.js, tu peux
# l'éditer librement et committer.
#
# Champs obligatoires : year, display_name, repo_url
# Champs optionnels   : org, description, pages_url, image_url, topics
#
# topics: liste de tags libres affichés sur la carte et utilisables dans le
# filtre "Tags" de la page d'accueil (ex: [robotique, dessin, otto]).
#
# Exemple :
# - year: "2022-23"
